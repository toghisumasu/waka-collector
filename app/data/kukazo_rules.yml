# 句数（くかず）ルール表 ── 連歌新式準拠
#
# 出典：連歌新式「一　句数」条
#   春　秋　恋     ── 五句（春秋の句不至三句者不用之）
#   夏　冬　旅　神祇　釈教　述懐　山類　水辺　居所 ── 三句
#
# 句数規制を「設けない」部立（このファイルに載せない）：
#   動物・植物・光物・降物・聳物・衣装・名所・時分・人倫
#   ── 句去（kuzari_rules.yml）で規制するが、連続上限の句数規制は新式に見当たらない。
#
# seasons: 季節ごとの連続上限（max）と最短規制（min）
#   min は春・秋のみ。転換時に streak が min 未満なら式目違反。
#   雑（無季）は上限なし ── ここに載せない。
#
# bui: 部立ごとの連続上限（max）
#   恋のみ五句。旅・述懐・神祇・釈教・山類・水辺・居所は三句。

seasons:
  春:
    max: 5
    min: 3
  秋:
    max: 5
    min: 3
  夏:
    max: 3
  冬:
    max: 3

bui:
  恋:
    max: 5
  旅:
    max: 3
  述懐:
    max: 3
  神祇:
    max: 3
  釈教:
    max: 3
  山類:
    max: 3
  水辺:
    max: 3
  居所:
    max: 3
